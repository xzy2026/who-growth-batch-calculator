<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel日期转换测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 3px;
        }
        .pass {
            color: green;
            font-weight: bold;
        }
        .fail {
            color: red;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #4CAF50;
            color: white;
        }
        input[type="file"] {
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>Excel日期转换测试工具</h1>
    
    <div class="test-section">
        <h2>1. 单元测试：Excel日期序列号转换</h2>
        <button onclick="runUnitTests()">运行单元测试</button>
        <div id="unitTestResults"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Excel文件测试</h2>
        <input type="file" id="excelFile" accept=".xlsx,.xls" />
        <button onclick="testExcelFile()">测试Excel文件</button>
        <div id="excelTestResults"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 时区测试</h2>
        <button onclick="testTimezone()">测试时区影响</button>
        <div id="timezoneTestResults"></div>
    </div>

    <script>
        // 修改后的Excel日期转换函数（使用UTC方法）
        function excelDateToDateString(excelDateNum) {
            // 使用UTC时间作为基准，避免时区问题导致日期减少一天
            const excelEpoch = Date.UTC(1899, 11, 30); // UTC 1899-12-30 00:00:00
            const date = new Date(excelEpoch + (excelDateNum - 1) * 86400000);
            // 使用UTC方法获取日期，避免时区转换问题
            const year = date.getUTCFullYear();
            const month = String(date.getUTCMonth() + 1).padStart(2, '0');
            const day = String(date.getUTCDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 旧的转换函数（用于对比）
        function excelDateToDateStringOld(excelDateNum) {
            const excelEpoch = new Date(1899, 11, 30);
            const date = new Date(excelEpoch.getTime() + (excelDateNum - 1) * 86400000);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 单元测试
        function runUnitTests() {
            const results = document.getElementById('unitTestResults');
            results.innerHTML = '<h3>测试结果：</h3>';
            
            // 测试用例：Excel日期序列号 -> 预期日期
            const testCases = [
                { excelNum: 1, expected: '1900-01-01', desc: 'Excel序列号1 = 1900-01-01' },
                { excelNum: 43831, expected: '2020-01-01', desc: 'Excel序列号43831 = 2020-01-01' },
                { excelNum: 44197, expected: '2021-01-01', desc: 'Excel序列号44197 = 2021-01-01' },
                { excelNum: 44562, expected: '2022-01-01', desc: 'Excel序列号44562 = 2022-01-01' },
                { excelNum: 44927, expected: '2023-01-01', desc: 'Excel序列号44927 = 2023-01-01' },
                { excelNum: 43738, expected: '2019-10-31', desc: 'Excel序列号43738 = 2019-10-31' },
                { excelNum: 45658, expected: '2025-11-30', desc: 'Excel序列号45658 = 2025-11-30' },
                { excelNum: 45658, expected: '2025-12-01', desc: 'Excel序列号45658 = 2025-12-01 (如果减少一天)' },
            ];
            
            let passCount = 0;
            let failCount = 0;
            
            testCases.forEach((testCase, index) => {
                const result = excelDateToDateString(testCase.excelNum);
                const oldResult = excelDateToDateStringOld(testCase.excelNum);
                const passed = result === testCase.expected;
                
                if (passed) passCount++;
                else failCount++;
                
                const statusClass = passed ? 'pass' : 'fail';
                const statusText = passed ? '✓ 通过' : '✗ 失败';
                
                results.innerHTML += `
                    <div class="test-result">
                        <strong>测试 ${index + 1}:</strong> ${testCase.desc}<br>
                        Excel序列号: ${testCase.excelNum}<br>
                        新方法结果: <span class="${statusClass}">${result}</span><br>
                        旧方法结果: ${oldResult} ${oldResult !== result ? '<span style="color:orange;">(有差异)</span>' : ''}<br>
                        预期结果: ${testCase.expected}<br>
                        状态: <span class="${statusClass}">${statusText}</span>
                    </div>
                `;
            });
            
            results.innerHTML += `
                <div class="test-result" style="background: ${failCount > 0 ? '#ffebee' : '#e8f5e9'};">
                    <strong>总计:</strong> ${passCount} 通过, ${failCount} 失败
                </div>
            `;
        }

        // 时区测试
        function testTimezone() {
            const results = document.getElementById('timezoneTestResults');
            results.innerHTML = '<h3>时区测试结果：</h3>';
            
            const testCases = [
                { excelNum: 43738, desc: '2019-10-31' },
                { excelNum: 45658, desc: '2025-11-30' },
            ];
            
            testCases.forEach(testCase => {
                const result = excelDateToDateString(testCase.excelNum);
                const oldResult = excelDateToDateStringOld(testCase.excelNum);
                
                results.innerHTML += `
                    <div class="test-result">
                        <strong>测试日期:</strong> ${testCase.desc} (Excel序列号: ${testCase.excelNum})<br>
                        新方法(UTC): <span class="pass">${result}</span><br>
                        旧方法(本地时区): ${oldResult}<br>
                        当前时区: ${Intl.DateTimeFormat().resolvedOptions().timeZone}<br>
                        时区偏移: UTC${new Date().getTimezoneOffset() > 0 ? '-' : '+'}${Math.abs(new Date().getTimezoneOffset() / 60)}:${String(Math.abs(new Date().getTimezoneOffset() % 60)).padStart(2, '0')}<br>
                        ${result !== oldResult ? '<span style="color:red;">⚠️ 发现差异！旧方法可能有时区问题</span>' : '<span style="color:green;">✓ 两种方法结果一致</span>'}
                    </div>
                `;
            });
        }

        // Excel文件测试
        function testExcelFile() {
            const fileInput = document.getElementById('excelFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('请先选择Excel文件');
                return;
            }
            
            const results = document.getElementById('excelTestResults');
            results.innerHTML = '<h3>正在读取Excel文件...</h3>';
            
            // 使用FileReader读取Excel文件
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    // 这里需要使用SheetJS库来解析Excel
                    // 为了简化，我们提示用户使用浏览器控制台
                    results.innerHTML = `
                        <div class="test-result">
                            <h4>Excel文件读取说明：</h4>
                            <p>要测试Excel文件，请在浏览器控制台（F12）中运行以下代码：</p>
                            <pre style="background: #f5f5f5; padding: 10px; border-radius: 3px;">
// 注意：需要先引入SheetJS库
// 或者使用我们提供的测试方法

// 测试Excel日期转换函数
function testExcelDate(excelNum) {
    const excelEpoch = Date.UTC(1899, 11, 30);
    const date = new Date(excelEpoch + (excelNum - 1) * 86400000);
    const year = date.getUTCFullYear();
    const month = String(date.getUTCMonth() + 1).padStart(2, '0');
    const day = String(date.getUTCDate()).padStart(2, '0');
    return \`\${year}-\${month}-\${day}\`;
}

// 测试示例
console.log('2019-10-31:', testExcelDate(43738));
console.log('2025-11-30:', testExcelDate(45658));
                            </pre>
                            <p><strong>文件信息：</strong></p>
                            <ul>
                                <li>文件名: ${file.name}</li>
                                <li>文件大小: ${(file.size / 1024).toFixed(2)} KB</li>
                                <li>文件类型: ${file.type || 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}</li>
                            </ul>
                            <p><strong>建议：</strong>在HTML页面中直接上传Excel文件，系统会自动解析日期。检查解析后的日期是否正确。</p>
                        </div>
                    `;
                } catch (error) {
                    results.innerHTML = `<div class="test-result" style="background: #ffebee;">
                        <strong>错误:</strong> ${error.message}
                    </div>`;
                }
            };
            
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
