<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生长评价总体报告 - 享智云</title>
    <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 16px; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #366092 0%, #4a7ba7 100%); color: white; padding: 24px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 16px; }
        .header-logo { height: 56px; width: auto; border-radius: 12px; }
        .content { padding: 24px; }
        .report-title { text-align: center; margin-bottom: 20px; font-size: 18px; color: #333; }
        .stats-row { text-align: center; margin-bottom: 24px; font-size: 15px; color: #666; }
        .tabs { display: flex; gap: 0; border-bottom: 2px solid #e0e0e0; margin-bottom: 20px; }
        .tab { padding: 12px 24px; cursor: pointer; font-size: 15px; color: #666; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .tab:hover { color: #366092; }
        .tab.active { color: #366092; font-weight: bold; border-bottom-color: #366092; }
        .panel { display: none; }
        .panel.active { display: block; }
        .chart-box { background: #fafafa; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .chart-title { font-size: 15px; margin-bottom: 12px; color: #333; }
        #pieChart, #radarChart { width: 100%; height: 320px; }
        .card-list { display: flex; flex-direction: column; gap: 12px; }
        .indicator-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
        .indicator-card .icon { width: 48px; height: 48px; background: #e7f3ff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #366092; flex-shrink: 0; }
        .indicator-card .content { flex: 1; }
        .indicator-card .name { font-size: 15px; font-weight: bold; color: #333; margin-bottom: 4px; }
        .indicator-card .values { font-size: 14px; color: #666; }
        .suggestion-box { background: #e7f3ff; border-left: 4px solid #366092; padding: 16px 20px; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.8; color: #333; }
        .back-row { text-align: center; margin-top: 24px; }
        .back-btn { display: inline-block; padding: 10px 24px; background: #366092; color: #fff; text-decoration: none; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; margin-left: 8px; }
        .back-btn:hover { background: #4a7ba7; }
        .back-btn:first-child { margin-left: 0; }
        .no-data { text-align: center; padding: 40px 20px; color: #999; }
        .footer { padding: 16px; text-align: center; font-size: 12px; color: #888; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="assets/logo.jpg" alt="Logo" class="header-logo" onerror="this.style.display='none'">
            <div>
                <h1>生长评价总体报告</h1>
                <p>享智云 · 7岁以下儿童生长标准（WS/T 423-2022）</p>
            </div>
        </div>
        <div class="content" id="reportContent">
            <div class="no-data" id="noData">暂无总体报告数据，请从计算器页面点击「生成总体报告」。</div>
            <div id="reportBody" style="display: none;">
                <div class="report-title" id="reportTitle">—— 生长评价总体报告 ——</div>
                <div class="stats-row" id="statsRow">体测人数：0 人</div>
                <div class="tabs">
                    <div class="tab active" data-tab="overview">概况分析</div>
                    <div class="tab" data-tab="detail">单项分析</div>
                    <div class="tab" data-tab="suggestion">方案建议</div>
                </div>
                <div id="panelOverview" class="panel active">
                    <div class="chart-box">
                        <div class="chart-title">评价分布（良好 / 合格 / 不合格）</div>
                        <div id="pieChart"></div>
                    </div>
                    <div class="chart-box">
                        <div class="chart-title">各指标 Z 分雷达图（批次平均 vs 参考中位 0）</div>
                        <div id="radarChart"></div>
                    </div>
                </div>
                <div id="panelDetail" class="panel">
                    <div class="chart-title">各指标批次统计</div>
                    <div class="card-list" id="cardList"></div>
                </div>
                <div id="panelSuggestion" class="panel">
                    <div class="chart-title">健康建议</div>
                    <div class="suggestion-box" id="suggestionBox"></div>
                </div>
                <div class="back-row">
                    <a href="javascript:window.close()" class="back-btn">关闭报告</a>
                    <a href="javascript:void(0)" class="back-btn" id="downloadReportBtn">下载报告</a>
                </div>
            </div>
        </div>
        <div class="footer">
            <p>本报告参照 WS/T 423-2022，数据仅供参考，不作为诊断依据。如有疑问请咨询医疗机构。</p>
        </div>
    </div>
    <script>
        (function() {
            var STORAGE_KEY = 'childGrowthBatchReport';
            var percentileToZMap = { 'P3': -1.88, 'P10': -1.28, 'P25': -0.67, 'P50': 0, 'P75': 0.67, 'P90': 1.28, 'P97': 1.88 };

            function parseValueToZ(valueStr, mode) {
                if (!valueStr || valueStr === '-') return null;
                valueStr = String(valueStr).trim();
                if (mode === 'std') {
                    if (valueStr === '>3SD') return 3;
                    if (valueStr === '<-3SD') return -3;
                    var m = valueStr.match(/^(-?[\d.]+)SD$/);
                    if (m) return parseFloat(m[1]);
                    return null;
                }
                if (mode === 'percentile') {
                    if (valueStr.indexOf('<') === 0) return -2.5;
                    if (valueStr.indexOf('>') >= 0 || valueStr.indexOf('≥') >= 0) return 2.5;
                    var pMatch = valueStr.match(/^P(\d+)$/);
                    if (pMatch) {
                        var p = parseInt(pMatch[1], 10);
                        if (percentileToZMap['P' + p] !== undefined) return percentileToZMap['P' + p];
                        if (p <= 3) return -1.88;
                        if (p >= 97) return 1.88;
                        if (p <= 25) return -0.67 + (p - 25) / 22 * 1.21;
                        if (p <= 50) return (p - 50) / 25 * 0.67;
                        if (p <= 75) return (p - 50) / 25 * 0.67;
                        return 0.67 + (p - 75) / 22 * 0.61;
                    }
                }
                return null;
            }

            function getTierLevel(data) {
                var results = (data.indicators || []).map(function(ind) { return (ind.result || '').trim(); });
                var hasSevere = false, hasAbnormal = false;
                var severeWords = ['重度低体重', '重度生长迟缓', '重度消瘦', '重度肥胖'];
                var abnormalWords = ['低体重', '生长迟缓', '消瘦', '超重', '肥胖'];
                for (var i = 0; i < results.length; i++) {
                    var r = results[i];
                    if (!r || r === '-') continue;
                    if (severeWords.some(function(w) { return r.indexOf(w) !== -1; })) hasSevere = true;
                    if (abnormalWords.some(function(w) { return r.indexOf(w) !== -1; })) hasAbnormal = true;
                }
                if (hasSevere) return 'fail';
                if (hasAbnormal) return 'pass';
                return 'good';
            }

            function getBatchSuggestion(counts) {
                var total = counts.good + counts.pass + counts.fail;
                if (total === 0) return '';
                var pGood = counts.good / total;
                var pFail = counts.fail / total;
                if (pGood >= 0.7) {
                    return '本批次儿童生长状况整体良好，大部分儿童各项指标处于理想范围。建议继续保持均衡营养与适度运动：保证优质蛋白、蔬菜水果、谷物的合理搭配，规律三餐，减少高油高糖零食与含糖饮料；每天保证适量户外活动，如跑跳、球类、骑车等有氧锻炼，保持规律作息与充足睡眠。坚持定期生长发育监测即可。';
                }
                if (pFail >= 0.2) {
                    return '本批次中有较多儿童存在明显生长偏离，建议组织集中健康评估，到儿保科或营养科进行专业检查。日常可先从生活方式调整：饮食保证营养均衡，不暴饮暴食、不挑食偏食，合理搭配蛋白质、主食、蔬菜，减少高油高糖食物。运动以温和、可持续为主，如快走、慢跑、跳绳、游泳等，根据孩子身体情况循序渐进。早发现、早指导、科学干预，有助于儿童健康成长。';
                }
                return '本批次部分儿童存在生长指标未达理想状态，可能存在偏瘦、超重、生长偏慢等情况。建议关注饮食与运动：规律三餐，保证足量优质蛋白摄入，控制油炸食品、甜品、含糖饮料；每周至少5天中等强度活动，如快走、跳绳、游泳、球类等，每天户外活动不少于1小时。可到儿保科或营养科做专业咨询，在专业指导下调整生活习惯，多数儿童能逐步回归正常生长轨迹。';
            }

            function renderReport(raw) {
                var data = typeof raw === 'string' ? JSON.parse(raw) : raw;
                var rows = data.rows || [];
                var mode = data.mode || 'percentile';
                if (rows.length === 0) return;

                var counts = { good: 0, pass: 0, fail: 0 };
                var indNames = ['年龄别体重', '年龄别身长/身高', '身长/身高体重', '年龄别BMI', '年龄别头围'];
                var indIds = ['ageWeight', 'ageHeight', 'heightWeight', 'ageBmi', 'ageHead'];
                var sumZ = [0,0,0,0,0], countZ = [0,0,0,0,0];
                var passCounts = [0,0,0,0,0];

                rows.forEach(function(row) {
                    var tier = getTierLevel(row);
                    if (tier === 'good') counts.good++;
                    else if (tier === 'pass') counts.pass++;
                    else counts.fail++;

                    var inds = row.indicators || [];
                    inds.forEach(function(ind) {
                        var colIdx = indIds.indexOf(ind.id);
                        if (colIdx < 0) return;
                        var z = parseValueToZ(ind.value, mode);
                        if (z !== null) {
                            sumZ[colIdx] += z;
                            countZ[colIdx]++;
                        }
                        var r = (ind.result || '').trim();
                        if (!r || r === '-') passCounts[colIdx]++;
                        else {
                            var severe = ['重度低体重','重度生长迟缓','重度消瘦','重度肥胖'].some(function(w){return r.indexOf(w)!==-1;});
                            var abnormal = ['低体重','生长迟缓','消瘦','超重','肥胖'].some(function(w){return r.indexOf(w)!==-1;});
                            if (!severe && !abnormal) passCounts[colIdx]++;
                        }
                    });
                });

                var avgZ = [];
                for (var i = 0; i < 5; i++) avgZ.push(countZ[i] > 0 ? sumZ[i] / countZ[i] : 0);

                document.getElementById('noData').style.display = 'none';
                document.getElementById('reportBody').style.display = 'block';
                var total = counts.good + counts.pass + counts.fail;
                document.getElementById('statsRow').textContent = '体测人数：' + total + ' 人 · 良好 ' + counts.good + ' 人 · 合格 ' + counts.pass + ' 人 · 不合格 ' + counts.fail + ' 人';

                var pieData = [
                    { value: counts.good, name: '良好', itemStyle: { color: '#28a745' } },
                    { value: counts.pass, name: '合格', itemStyle: { color: '#ffc107' } },
                    { value: counts.fail, name: '不合格', itemStyle: { color: '#dc3545' } }
                ].filter(function(d) { return d.value > 0; });
                if (pieData.length === 0) pieData = [{ value: 1, name: '无数据', itemStyle: { color: '#ddd' } }];

                var pieChart = echarts.init(document.getElementById('pieChart'));
                pieChart.setOption({ tooltip: { trigger: 'item', formatter: '{b}: {c} 人 ({d}%)' }, legend: { orient: 'horizontal', bottom: 10 }, series: [{ type: 'pie', radius: ['40%', '70%'], data: pieData }] });

                var radarChart = echarts.init(document.getElementById('radarChart'));
                var radarMax = 2;
                radarChart.setOption({
                    tooltip: {},
                    radar: { indicator: indNames.map(function(n) { return { name: n, max: radarMax, min: -radarMax }; }), center: ['50%', '52%'], radius: '60%' },
                    series: [{ type: 'radar', data: [
                        { value: avgZ, name: '批次平均', lineStyle: { width: 2 }, areaStyle: { opacity: 0.3 } },
                        { value: [0,0,0,0,0], name: '参考中位', lineStyle: { type: 'dashed', width: 1 }, symbol: 'none' }
                    ]}]
                });

                var cardHtml = '';
                for (var i = 0; i < 5; i++) {
                    var avg = countZ[i] > 0 ? avgZ[i].toFixed(2) : '—';
                    var passRate = rows.length > 0 ? ((passCounts[i] / rows.length) * 100).toFixed(0) : '—';
                    cardHtml += '<div class="indicator-card"><div class="icon">📊</div><div class="content"><div class="name">' + indNames[i] + '</div><div class="values">平均 Z 分：' + avg + ' · 合格率：' + passRate + '%</div></div></div>';
                }
                document.getElementById('cardList').innerHTML = cardHtml;
                document.getElementById('suggestionBox').textContent = getBatchSuggestion(counts);
                window._batchReportData = { counts: counts, avgZ: avgZ, indNames: indNames, total: total };
            }

            function initTabs() {
                document.querySelectorAll('.tab').forEach(function(tab) {
                    tab.addEventListener('click', function() {
                        var t = this.getAttribute('data-tab');
                        document.querySelectorAll('.tab').forEach(function(el) { el.classList.remove('active'); });
                        document.querySelectorAll('.panel').forEach(function(el) { el.classList.remove('active'); });
                        this.classList.add('active');
                        var panel = document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1));
                        if (panel) panel.classList.add('active');
                        setTimeout(function() {
                            var pie = document.getElementById('pieChart');
                            var radar = document.getElementById('radarChart');
                            if (pie && echarts.getInstanceByDom(pie)) echarts.getInstanceByDom(pie).resize();
                            if (radar && echarts.getInstanceByDom(radar)) echarts.getInstanceByDom(radar).resize();
                        }, 50);
                    });
                });
            }

            function downloadReport() {
                var d = window._batchReportData;
                if (!d || typeof html2canvas === 'undefined' || typeof jspdf === 'undefined') { alert('请稍候再试或刷新后下载。'); return; }
                var JsPDF = window.jspdf && window.jspdf.jsPDF ? window.jspdf.jsPDF : window.jspdf;
                if (!JsPDF) { alert('PDF 库未加载。'); return; }
                var pieChart = echarts.getInstanceByDom(document.getElementById('pieChart'));
                var radarChart = echarts.getInstanceByDom(document.getElementById('radarChart'));
                if (!pieChart || !radarChart) { alert('图表未就绪。'); return; }
                var pieUrl = pieChart.getDataURL({ type: 'png', pixelRatio: 2 });
                var radarUrl = radarChart.getDataURL({ type: 'png', pixelRatio: 2 });

                var wrapper = document.createElement('div');
                wrapper.style.cssText = 'position:fixed;top:0;left:0;z-index:99999;width:800px;max-height:100vh;overflow:auto;font-family:Microsoft YaHei,Arial,sans-serif;font-size:14px;color:#333;background:#fff;padding:20px;box-sizing:border-box;';

                var page1 = document.createElement('div');
                page1.style.cssText = 'width:800px;background:#fff;';
                page1.innerHTML = '<div style="text-align:center;margin-bottom:16px;font-size:18px;">生长评价总体报告</div><div style="text-align:center;margin-bottom:20px;font-size:14px;">体测人数：' + d.total + ' 人</div><div style="margin-bottom:12px;">评价分布</div><img src="' + pieUrl + '" style="width:100%;height:300px;display:block;margin-bottom:24px;" /><div style="margin-bottom:12px;">各指标 Z 分雷达图（批次平均）</div><img src="' + radarUrl + '" style="width:100%;height:300px;display:block;" />';
                wrapper.appendChild(page1);

                var page2 = document.createElement('div');
                page2.style.cssText = 'width:800px;background:#fff;page-break-before:always;';
                page2.innerHTML = '<div style="margin-bottom:16px;font-size:16px;">各指标批次统计</div>' + document.getElementById('cardList').innerHTML;
                wrapper.appendChild(page2);

                var page3 = document.createElement('div');
                page3.style.cssText = 'width:800px;background:#fff;page-break-before:always;';
                var st = (document.getElementById('suggestionBox').innerText || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                page3.innerHTML = '<div style="margin-bottom:12px;font-size:16px;">健康建议</div><div style="background:#e7f3ff;border-left:4px solid #366092;padding:16px 20px;font-size:14px;line-height:1.8;">' + st + '</div>';
                wrapper.appendChild(page3);

                document.body.appendChild(wrapper);
                var filename = '生长评价总体报告_' + new Date().toISOString().slice(0, 10) + '.pdf';

                function doPdf() {
                    html2canvas(page1, { scale: 1.5, useCORS: true }).then(function(c1) {
                        html2canvas(page2, { scale: 1.5, useCORS: true }).then(function(c2) {
                            html2canvas(page3, { scale: 1.5, useCORS: true }).then(function(c3) {
                                var pdf = new JsPDF('p', 'mm', 'a4');
                                var w = pdf.internal.pageSize.getWidth();
                                var h = pdf.internal.pageSize.getHeight();
                                pdf.addImage(c1.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, w, Math.min((c1.height * w) / c1.width, h));
                                pdf.addPage();
                                pdf.addImage(c2.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, w, Math.min((c2.height * w) / c2.width, h));
                                pdf.addPage();
                                pdf.addImage(c3.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, w, Math.min((c3.height * w) / c3.width, h));
                                pdf.save(filename);
                                if (wrapper.parentNode) document.body.removeChild(wrapper);
                            }).catch(function() { if (wrapper.parentNode) document.body.removeChild(wrapper); });
                        }).catch(function() { if (wrapper.parentNode) document.body.removeChild(wrapper); });
                    }).catch(function() { if (wrapper.parentNode) document.body.removeChild(wrapper); });
                }
                setTimeout(doPdf, 200);
            }

            var raw = localStorage.getItem(STORAGE_KEY);
            if (raw) { try { renderReport(raw); } catch (e) { document.getElementById('noData').textContent = '数据解析失败。'; } }
            initTabs();
            document.getElementById('downloadReportBtn').addEventListener('click', downloadReport);
            window.addEventListener('resize', function() {
                var pie = document.getElementById('pieChart');
                var radar = document.getElementById('radarChart');
                if (pie && echarts.getInstanceByDom(pie)) echarts.getInstanceByDom(pie).resize();
                if (radar && echarts.getInstanceByDom(radar)) echarts.getInstanceByDom(radar).resize();
            });
        })();
    </script>
</body>
</html>
