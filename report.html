<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童生长评价报告 - 享智云</title>
    <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 16px; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #366092 0%, #4a7ba7 100%); color: white; padding: 24px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 16px; }
        .header-logo { height: 56px; width: auto; border-radius: 12px; }
        .header h1 { font-size: 22px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .content { padding: 24px; }
        .report-title { text-align: center; margin-bottom: 20px; font-size: 18px; color: #333; }
        .overview-row { display: flex; align-items: center; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
        .grade-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #333; flex-shrink: 0; }
        .grade-circle.good { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: #fff; }
        .grade-circle.pass { background: linear-gradient(135deg, #ffc107 0%, #ffb300 100%); color: #333; }
        .grade-circle.fail { background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); color: #fff; }
        .legend { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; align-items: center; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .legend-dot { width: 14px; height: 14px; border-radius: 4px; }
        .legend-dot.good { background: #28a745; }
        .legend-dot.pass { background: #ffc107; }
        .legend-dot.fail { background: #dc3545; }
        .tabs { display: flex; gap: 0; border-bottom: 2px solid #e0e0e0; margin-bottom: 20px; }
        .tab { padding: 12px 24px; cursor: pointer; font-size: 15px; color: #666; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .tab:hover { color: #366092; }
        .tab.active { color: #366092; font-weight: bold; border-bottom-color: #366092; }
        .panel { display: none; }
        .panel.active { display: block; }
        .chart-box { background: #fafafa; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .chart-title { font-size: 15px; margin-bottom: 12px; color: #333; }
        #radarChart, #barChart { width: 100%; height: 360px; }
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
        .info-table th, .info-table td { border: 1px solid #ddd; padding: 10px 12px; text-align: left; }
        .info-table th { background: #366092; color: #fff; width: 140px; }
        .indicator-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .indicator-table th, .indicator-table td { border: 1px solid #ddd; padding: 10px 12px; }
        .indicator-table th { background: #e7f3ff; }
        .eval-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
        .eval-table th, .eval-table td { border: 1px solid #ddd; padding: 8px 10px; text-align: center; }
        .eval-table th { background: #366092; color: #fff; }
        .eval-table td.first-col { text-align: left; background: #f9f9f9; font-weight: 500; min-width: 100px; }
        .suggestion-box { background: #e7f3ff; border-left: 4px solid #366092; padding: 16px 20px; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.7; color: #333; }
        .back-row { text-align: center; margin-top: 24px; }
        .back-btn { display: inline-block; padding: 10px 24px; background: #366092; color: #fff; text-decoration: none; border-radius: 8px; font-size: 14px; }
        .back-btn:hover { background: #4a7ba7; }
        .no-data { text-align: center; padding: 40px 20px; color: #999; }
        .footer { padding: 16px; text-align: center; font-size: 12px; color: #888; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="assets/logo.jpg" alt="Logo" class="header-logo" onerror="this.style.display='none'">
            <div>
                <h1>儿童生长评价报告</h1>
                <p>享智云 · 7岁以下儿童生长标准（WS/T 423-2022）</p>
            </div>
        </div>
        <div class="content" id="reportContent">
            <div class="no-data" id="noData">暂无报告数据，请从计算器页面点击「生成报告」。</div>
            <div id="reportBody" style="display: none;">
                <div class="report-title" id="reportTitle">—— 生长评价报告 ——</div>
                <div class="overview-row">
                    <div class="grade-circle" id="gradeCircle">—</div>
                    <div class="legend">
                        <span class="legend-item"><span class="legend-dot good"></span>良好</span>
                        <span class="legend-item"><span class="legend-dot pass"></span>合格</span>
                        <span class="legend-item"><span class="legend-dot fail"></span>不合格</span>
                    </div>
                </div>
                <div class="tabs">
                    <div class="tab active" data-tab="overview">概况分析</div>
                    <div class="tab" data-tab="detail">单项分析</div>
                    <div class="tab" data-tab="suggestion">方案建议</div>
                </div>
                <div id="panelOverview" class="panel active">
                    <div class="chart-box">
                        <div class="chart-title">各指标 Z 分雷达图（中心为 0，外圈为 ±2）</div>
                        <div id="radarChart"></div>
                    </div>
                    <div class="chart-box">
                        <div class="chart-title">各指标 Z 分柱状图</div>
                        <div id="barChart"></div>
                    </div>
                </div>
                <div id="panelDetail" class="panel">
                    <div class="chart-box">
                        <table class="info-table" id="infoTable"></table>
                        <div class="chart-title">表1 儿童生长水平的百分位数评价方法</div>
                        <table class="eval-table" id="table1Percentile"></table>
                        <div class="chart-title">表2 儿童生长水平的标准差评价方法</div>
                        <table class="eval-table" id="table2StdLevel"></table>
                        <div class="chart-title">表3 儿童营养状况的标准差评价方法</div>
                        <table class="eval-table" id="table3StdNutrition"></table>
                    </div>
                </div>
                <div id="panelSuggestion" class="panel">
                    <div class="suggestion-box" id="suggestionBox"></div>
                </div>
                <div class="back-row">
                    <a href="javascript:window.close()" class="back-btn">关闭报告</a>
                </div>
            </div>
        </div>
        <div class="footer">
            <p>本报告参照 WS/T 423-2022，数据仅供参考，不作为诊断依据。如有疑问请咨询医疗机构。</p>
        </div>
    </div>
    <script>
        (function() {
            var STORAGE_KEY = 'childGrowthReport';
            var percentileToZMap = { 'P3': -1.88, 'P10': -1.28, 'P25': -0.67, 'P50': 0, 'P75': 0.67, 'P90': 1.28, 'P97': 1.88 };

            function parseValueToZ(valueStr, mode) {
                if (!valueStr || valueStr === '-') return null;
                valueStr = String(valueStr).trim();
                if (mode === 'std') {
                    if (valueStr === '>3SD') return 3;
                    if (valueStr === '<-3SD') return -3;
                    var m = valueStr.match(/^(-?[\d.]+)SD$/);
                    if (m) return parseFloat(m[1]);
                    return null;
                }
                if (mode === 'percentile') {
                    if (valueStr === '<P3' || valueStr.startsWith('<')) return -2.5;
                    if (valueStr === '>P97' || valueStr === '≥P97' || (valueStr.startsWith('>') || valueStr.startsWith('≥'))) return 2.5;
                    var pMatch = valueStr.match(/^P(\d+)$/);
                    if (pMatch) {
                        var p = parseInt(pMatch[1], 10);
                        if (percentileToZMap['P' + p] !== undefined) return percentileToZMap['P' + p];
                        if (p <= 3) return -1.88;
                        if (p >= 97) return 1.88;
                        if (p <= 25) return -0.67 + (p - 25) / 22 * 1.21;
                        if (p <= 50) return (p - 50) / 25 * 0.67;
                        if (p <= 75) return (p - 50) / 25 * 0.67;
                        return 0.67 + (p - 75) / 22 * 0.61;
                    }
                }
                return null;
            }

            function getTierLevel(data) {
                var results = (data.indicators || []).map(function(ind) { return (ind.result || '').trim(); });
                var hasSevere = false;
                var hasAbnormal = false;
                var severeWords = ['重度低体重', '重度生长迟缓', '重度消瘦', '重度肥胖'];
                var abnormalWords = ['低体重', '生长迟缓', '消瘦', '超重', '肥胖'];
                for (var i = 0; i < results.length; i++) {
                    var r = results[i];
                    if (!r || r === '-') continue;
                    if (severeWords.some(function(w) { return r.indexOf(w) !== -1; })) hasSevere = true;
                    if (abnormalWords.some(function(w) { return r.indexOf(w) !== -1; })) hasAbnormal = true;
                }
                if (hasSevere) return { level: 'fail', label: '不合格', cls: 'fail' };
                if (hasAbnormal) return { level: 'pass', label: '合格', cls: 'pass' };
                return { level: 'good', label: '良好', cls: 'good' };
            }

            function getSuggestionText(tier, data) {
                var name = (data.name || '该儿童').trim() || '该儿童';
                if (tier.level === 'good') {
                    return '根据本次评估，' + name + ' 各项生长发育指标整体良好，大部分指标均处于理想范围，仅个别指标存在轻微波动，属于儿童生长过程中的正常现象。饮食上建议继续保持均衡营养，保证优质蛋白、蔬菜水果、谷物的合理搭配，规律三餐，少吃高油高糖高盐零食与含糖饮料。运动方面每天保证适量户外活动，多进行跑跳、球类、骑车等有氧锻炼，同时保持规律作息与充足睡眠，坚持定期监测生长发育即可。';
                }
                if (tier.level === 'pass') {
                    return '根据本次评估，' + name + ' 在身高、体重等方面存在一项或多项指标未达理想状态，可能存在偏瘦、超重、生长偏慢等情况。饮食上建议规律三餐，保证足量优质蛋白摄入，控制油炸食品、甜品、含糖饮料，根据孩子情况适当增加或调整总热量。运动方面每周至少保持5天中等强度活动，如快走、跳绳、游泳、球类等，每天户外活动不少于1小时。不必过度焦虑，可到儿保科或营养科做专业咨询，在专业指导下调整饮食与生活习惯，多数孩子能逐步回归正常生长轨迹。';
                }
                return '根据本次评估，' + name + ' 目前存在较明显的生长发育偏离，为更准确判断原因，建议带' + name + '到儿保科或儿童内分泌科进行全面检查。日常可先从生活方式调整：饮食保证营养均衡，不暴饮暴食、不挑食偏食，合理搭配蛋白质、主食、蔬菜，减少高油高糖食物。运动以温和、可持续为主，如快走、慢跑、跳绳、游泳、伸展运动等，根据孩子身体情况循序渐进。儿童生长发育可塑性强，早发现、早指导、科学干预，能更好地帮助孩子健康成长。';
            }

            function renderReport(raw) {
                var data = typeof raw === 'string' ? JSON.parse(raw) : raw;
                var mode = data.mode || 'percentile';
                var indicators = data.indicators || [];
                var names = [];
                var zValues = [];
                var validCount = 0;
                for (var i = 0; i < indicators.length; i++) {
                    names.push(indicators[i].name);
                    var z = parseValueToZ(indicators[i].value, mode);
                    if (z === null) z = 0;
                    else validCount++;
                    zValues.push(z);
                }
                var tier = getTierLevel(data);
                document.getElementById('noData').style.display = 'none';
                document.getElementById('reportBody').style.display = 'block';
                document.getElementById('reportTitle').textContent = (data.name ? data.name + ' · ' : '') + '生长评价报告';
                var circle = document.getElementById('gradeCircle');
                circle.textContent = tier.label;
                circle.className = 'grade-circle ' + tier.cls;
                document.getElementById('suggestionBox').textContent = getSuggestionText(tier, data);

                var infoRows = [
                    ['姓名', data.name || '—'],
                    ['性别', data.gender || '—'],
                    ['出生日期', data.birthDate || '—'],
                    ['测查日期', data.checkDate || '—'],
                    ['实足年龄', data.ageText || '—'],
                    ['体重(kg)', data.weight != null ? data.weight : '—'],
                    ['身高(cm)', data.height != null ? data.height : '—'],
                    ['BMI', data.bmi != null ? data.bmi : '—'],
                    ['头围(cm)', data.headCirc != null ? data.headCirc : '—'],
                    ['标准体重(kg)', data.stdWeight || '—'],
                    ['标准身高(cm)', data.stdHeight || '—']
                ];
                var infoHtml = infoRows.map(function(r) { return '<tr><th>' + r[0] + '</th><td>' + r[1] + '</td></tr>'; }).join('');
                document.getElementById('infoTable').innerHTML = infoHtml;

                function getZFromValue(valueStr, mode) {
                    var z = parseValueToZ(valueStr, mode);
                    return z === null ? null : z;
                }
                function getGrowthLevel(valueStr, mode) {
                    if (!valueStr || valueStr === '-') return null;
                    valueStr = String(valueStr).trim();
                    if (mode === 'percentile') {
                        if (valueStr.indexOf('<') === 0) return '下';
                        if (valueStr.indexOf('>') >= 0 || valueStr.indexOf('≥') >= 0) return '上';
                        var pMatch = valueStr.match(/^P(\d+)$/);
                        if (pMatch) {
                            var p = parseInt(pMatch[1], 10);
                            if (p >= 97) return '上';
                            if (p >= 75) return '中上';
                            if (p >= 25) return '中';
                            if (p >= 3) return '中下';
                            return '下';
                        }
                        return null;
                    }
                    var z = getZFromValue(valueStr, mode);
                    if (z === null) return null;
                    if (z >= 2) return '上';
                    if (z >= 1) return '中上';
                    if (z >= -1) return '中';
                    if (z >= -2) return '中下';
                    return '下';
                }
                var colNames = ['年龄别体重', '年龄别身长/身高', '身长/身高体重', '年龄别BMI'];
                var indByCol = { '年龄别体重': 0, '年龄别身长/身高': 1, '年龄别身高': 1, '身长/身高体重': 2, '身高别体重': 2, '年龄别BMI': 3 };
                var indMap = {};
                indicators.forEach(function(ind) {
                    if (indByCol[ind.name] !== undefined) indMap[indByCol[ind.name]] = ind;
                });

                var table1Rows = [
                    { label: '≥P97', level: '上' },
                    { label: 'P75～<P97', level: '中上' },
                    { label: 'P25～<P75', level: '中' },
                    { label: 'P3～<P25', level: '中下' },
                    { label: '<P3', level: '下' }
                ];
                var table2Rows = [
                    { label: '≥+2 SD', level: '上' },
                    { label: '+1 SD～<+2 SD', level: '中上' },
                    { label: '-1 SD～<+1 SD', level: '中' },
                    { label: '-2 SD～<-1 SD', level: '中下' },
                    { label: '<-2 SD', level: '下' }
                ];
                function cellForGrowthLevel(colIdx, rowLevel, normalRowLevel) {
                    var ind = indMap[colIdx];
                    if (!ind) return '';
                    var gl = getGrowthLevel(ind.value, mode);
                    if (gl === null) return '';
                    if (gl === rowLevel) return gl;
                    return '';
                }
                var normalLevel = '中';
                var t1Html = '<thead><tr><th>百分位数法</th><th>年龄别体重</th><th>年龄别身长/身高</th><th>身长/身高体重</th><th>年龄别BMI</th></tr></thead><tbody>';
                table1Rows.forEach(function(row) {
                    t1Html += '<tr><td class="first-col">' + row.label + '</td>';
                    for (var c = 0; c < 4; c++) t1Html += '<td>' + cellForGrowthLevel(c, row.level, normalLevel) + '</td>';
                    t1Html += '</tr>';
                });
                t1Html += '</tbody>';
                document.getElementById('table1Percentile').innerHTML = t1Html;

                var t2Html = '<thead><tr><th>标准差法</th><th>年龄别体重</th><th>年龄别身长/身高</th><th>身长/身高体重</th><th>年龄别BMI</th></tr></thead><tbody>';
                table2Rows.forEach(function(row) {
                    t2Html += '<tr><td class="first-col">' + row.label + '</td>';
                    for (var c = 0; c < 4; c++) t2Html += '<td>' + cellForGrowthLevel(c, row.level, normalLevel) + '</td>';
                    t2Html += '</tr>';
                });
                t2Html += '</tbody>';
                document.getElementById('table2StdLevel').innerHTML = t2Html;

                var table3Rows = [
                    { label: '≥+3 SD', r: { ageW: '', ageH: '', hw: '重度肥胖', bmi: '重度肥胖' } },
                    { label: '+2 SD～<+3 SD', r: { ageW: '', ageH: '', hw: '肥胖', bmi: '肥胖' } },
                    { label: '+1 SD～<+2 SD', r: { ageW: '', ageH: '', hw: '超重', bmi: '超重' } },
                    { label: '-1 SD～<+1 SD', r: { ageW: '', ageH: '', hw: '', bmi: '' } },
                    { label: '-2 SD～<-1 SD', r: { ageW: '', ageH: '', hw: '消瘦', bmi: '消瘦' } },
                    { label: '-3 SD～<-2 SD', r: { ageW: '低体重', ageH: '生长迟缓', hw: '', bmi: '' } },
                    { label: '<-3 SD', r: { ageW: '重度低体重', ageH: '重度生长迟缓', hw: '重度消瘦', bmi: '重度消瘦' } }
                ];
                var nutritionKeys = ['ageW', 'ageH', 'hw', 'bmi'];
                function getNutritionRowIndex(colIdx, result) {
                    var r = (result || '').trim();
                    if (r === '' || r === '—' || r === '-') return 3;
                    if (colIdx === 0) {
                        if (r === '重度低体重') return 6;
                        if (r === '低体重') return 5;
                        return 3;
                    }
                    if (colIdx === 1) {
                        if (r === '重度生长迟缓') return 6;
                        if (r === '生长迟缓') return 5;
                        return 3;
                    }
                    if (r === '重度肥胖') return 0;
                    if (r === '肥胖') return 1;
                    if (r === '超重') return 2;
                    if (r === '消瘦') return 4;
                    if (r === '重度消瘦') return 6;
                    return 3;
                }
                var t3Html = '<thead><tr><th>标准差法</th><th>年龄别体重</th><th>年龄别身长/身高</th><th>身长/身高体重</th><th>年龄别BMI</th></tr></thead><tbody>';
                table3Rows.forEach(function(row, rowIdx) {
                    t3Html += '<tr><td class="first-col">' + row.label + '</td>';
                    for (var c = 0; c < 4; c++) {
                        var ind = indMap[c];
                        var res = ind ? (ind.result || '').trim() : '';
                        if (res === '-') res = '';
                        var matchRow = getNutritionRowIndex(c, ind ? ind.result : '');
                        var cell = '';
                        if (matchRow === rowIdx) cell = res || '';
                        else if (rowIdx === 3) cell = '';
                        t3Html += '<td>' + cell + '</td>';
                    }
                    t3Html += '</tr>';
                });
                t3Html += '</tbody>';
                document.getElementById('table3StdNutrition').innerHTML = t3Html;

                if (typeof echarts !== 'undefined') {
                    var radarMax = 2.5;
                    var radarOption = {
                        tooltip: {},
                        radar: {
                            indicator: names.map(function(n) { return { name: n, max: radarMax, min: -radarMax }; }),
                            center: ['50%', '52%'],
                            radius: '58%'
                        },
                        series: [{
                            type: 'radar',
                            data: [
                                { value: zValues, name: '当前Z分', lineStyle: { width: 2 }, areaStyle: { opacity: 0.3 } },
                                { value: names.map(function() { return 0; }), name: '参考中位', lineStyle: { type: 'dashed', width: 1 }, symbol: 'none' }
                            ]
                        }]
                    };
                    var radarChart = echarts.init(document.getElementById('radarChart'));
                    radarChart.setOption(radarOption);

                    var barOption = {
                        tooltip: { trigger: 'axis' },
                        grid: { left: '12%', right: '8%', top: '10%', bottom: '15%' },
                        xAxis: { type: 'category', data: names, axisLabel: { interval: 0, rotate: 20 } },
                        yAxis: { type: 'value', name: 'Z分', min: -3, max: 3, axisLine: { show: true }, splitLine: { lineStyle: { type: 'dashed', opacity: 0.5 } } },
                        series: [{ type: 'bar', data: zValues, itemStyle: { color: '#366092' }, barWidth: '50%' }]
                    };
                    var barChart = echarts.init(document.getElementById('barChart'));
                    barChart.setOption(barOption);
                }
            }

            function resizeCharts() {
                [document.getElementById('radarChart'), document.getElementById('barChart')].forEach(function(el) {
                    if (el && typeof echarts !== 'undefined' && echarts.getInstanceByDom(el)) echarts.getInstanceByDom(el).resize();
                });
            }
            function initTabs() {
                document.querySelectorAll('.tab').forEach(function(tab) {
                    tab.addEventListener('click', function() {
                        var t = this.getAttribute('data-tab');
                        document.querySelectorAll('.tab').forEach(function(el) { el.classList.remove('active'); });
                        document.querySelectorAll('.panel').forEach(function(el) { el.classList.remove('active'); });
                        this.classList.add('active');
                        var panel = document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1));
                        if (panel) panel.classList.add('active');
                        setTimeout(resizeCharts, 50);
                    });
                });
            }

            var raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try { renderReport(raw); } catch (e) { document.getElementById('noData').textContent = '报告数据解析失败。'; }
            }
            initTabs();
            window.addEventListener('resize', resizeCharts);
        })();
    </script>
</body>
</html>
